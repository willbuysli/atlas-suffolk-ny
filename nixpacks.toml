[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]
[phases.install]
cmds = [
  "npm install -g pnpm@9 --prefix /usr/local",
  "export PATH=/usr/local/bin:$PATH && rm -rf node_modules && pnpm install --no-frozen-lockfile --prod=false",
  "export PATH=/usr/local/bin:$PATH && pnpm rebuild better-sqlite3"
]
[phases.build]
cmds = [
  "export PATH=/usr/local/bin:$PATH && pnpm run build"
]
[start]
cmd = "node dist/index.js"
# cache-bust: v10-rm-node-modules
